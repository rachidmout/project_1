<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bienvenue à WilderTown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="assets/styles/main.css" />
    <link rel="stylesheet" href="styles.css" />
    <script src="https://unpkg.com/mustache@latest"></script>
    <script src="assets/main.js"></script>
  </head>

  <body>
    <main>
      <h1>Bienvenue au festival international de Cannes&nbsp;!</h1>
      <p>
        L'édition <strong>2026</strong> arrive à grand pas !
        <br />
        La dernière édition a été un franc succès.
        <br />
        Inscrivez-vous dès maintenant à la prochaine édition.
      </p>
      <h2>Ils sont déjà inscrits</h2>
      <!-- ⬇️ écris la liste des inscrits sous cette ligne ⬇️ -->

      <ul></ul>
      <script>
        const participants = [
          { nom: "John", avatar: "public/boy" },
          { nom: "Paul", avatar: "public/boy" },
          { nom: "Maria", avatar: "public/girl" },
          { nom: "Ringo", avatar: "public/boy" },
          { nom: "Rachid", avatar: "public/boy" },
          { nom: "Marta", avatar: "public/girl" },
          { nom: "Jess", avatar: "username" },
          { nom: "Sofia", avatar: "public/girl" },
          { nom: "Gabriel", avatar: "public/boy" },
          { nom: "Malika", avatar: "public/girl" },
          { nom: "Leila", avatar: "public/girl" },
          { nom: "Kenji", avatar: "public/boy" },
          { nom: "Tim", avatar: "username" },
        ];
      </script>
      <script id="template" type="x-tmpl-mustache">
          {{#participants}}
              <li>
                  <img src="https://discovery-course-dev-avatars-placeholder.onrender.com/{{avatar}}?username={{nom}}" alt="">
                  <p>{{ nom }}</p>
              </li>
          {{/participants}}
          <form id="Inscription">
            <h2>Inscrivez-vous</h2>
            <label for="nom">Votre nom</label>
            <input type="text" id="nom" required>

            <label for="choix">Choisissez votre avatar</label>
            <select id="choix">
                <option value="public/boy">Masculin</option>
                <option value="public/girl">Féminin</option>
                <option value="username">Autre</option>
            </select>
            <button type="submit">Je m'inscris</button>
        </form>
        <script>    
          document.getElementById('Inscription').addEventListener('submit', ajouterParticipant);
      </script>
      </script>
    </main>
  </body>
</html>
